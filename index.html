<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanzae — كنز</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:wght@500;600;700&family=Playfair+Display:wght@500;600;700&family=Rajdhani:wght@500;600;700&family=EB+Garamond:wght@500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Fredoka:wght@500;600;700&family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#C9B896; --red-dk:#A89974; --red-soft:#1C2438;
    --ink:#EAEDF6; --ink-2:#9AA3BE; --line:#242D45; --line-2:#313C58;
    --paper:#161E33; --paper-2:#0E1424; --card:#1E2740; --gold:#D8C9A6; --gold-txt:#D8C9A6;
  }
  *{box-sizing:border-box;margin:0}
  body{background:linear-gradient(180deg,#0B1122 0%,#141C33 45%,#2A3350 100%);background-attachment:fixed;color:var(--ink);font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:74px;-webkit-font-smoothing:antialiased;position:relative}
  /* starfield */
  body:before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      radial-gradient(1.4px 1.4px at 20% 15%,rgba(255,255,255,.9),transparent),
      radial-gradient(1.2px 1.2px at 68% 8%,rgba(255,255,255,.7),transparent),
      radial-gradient(1px 1px at 42% 22%,rgba(255,255,255,.8),transparent),
      radial-gradient(1.6px 1.6px at 85% 18%,rgba(255,245,220,.85),transparent),
      radial-gradient(1px 1px at 12% 30%,rgba(255,255,255,.6),transparent),
      radial-gradient(1.3px 1.3px at 55% 35%,rgba(255,255,255,.7),transparent),
      radial-gradient(1px 1px at 78% 42%,rgba(255,255,255,.55),transparent),
      radial-gradient(1.5px 1.5px at 30% 48%,rgba(255,250,235,.7),transparent),
      radial-gradient(1px 1px at 90% 55%,rgba(255,255,255,.5),transparent),
      radial-gradient(1.2px 1.2px at 15% 62%,rgba(255,255,255,.55),transparent),
      radial-gradient(1px 1px at 62% 68%,rgba(255,255,255,.45),transparent),
      radial-gradient(1.4px 1.4px at 48% 78%,rgba(255,255,255,.5),transparent),
      radial-gradient(1px 1px at 82% 85%,rgba(255,255,255,.4),transparent),
      radial-gradient(1.1px 1.1px at 25% 90%,rgba(255,255,255,.45),transparent);
    background-repeat:no-repeat;opacity:.9}
  #app,#splash{position:relative;z-index:1}
  body[dir=rtl]{font-family:'Tajawal',sans-serif}
  .serif{font-family:'Inter',sans-serif}
  body[dir=rtl] .serif{font-family:'Tajawal',sans-serif}
  img{display:block}
  button{font:inherit;cursor:pointer;color:inherit;background:none;border:none}
  a{text-decoration:none;color:inherit}
  ::placeholder{color:#A8A29A}

  #splash{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:24px;text-align:center;padding:24px;transition:opacity .6s;
    background-color:#0B1122;animation:bgfade 1.8s ease .8s forwards}
  @keyframes bgfade{from{background-color:#0B1122}to{background-color:#0E1424}}
  /* name slides in red, then softly settles to dark ink (ae stays red) */
  .kmark{font-family:'Fraunces',serif;font-size:clamp(52px,15vw,96px);font-weight:600;letter-spacing:.01em;
    letter-spacing:.005em;line-height:1;color:var(--ink);
    animation:nameslidein 1s cubic-bezier(.2,.8,.2,1) .1s backwards}
  @keyframes nameslidein{from{opacity:0;transform:translateX(-60px)}to{opacity:1;transform:translateX(0)}}
  @keyframes namecolor{to{color:var(--ink)}}
  .kmark .dot{color:#D8C9A6}
  .kar{font-family:'Amiri',serif;font-size:26px;color:var(--ink-2);letter-spacing:.2em;
    opacity:0;animation:fadeup .9s ease 1.3s forwards}
  .kline{width:44px;height:2px;background:var(--red);animation:grow .7s ease 1.5s backwards}
  .ktag{font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-2);
    opacity:0;animation:fadeup .9s ease 1.6s forwards}
  .langrow{display:flex;gap:14px;margin-top:6px;opacity:0;animation:fadeup .9s ease 1.85s forwards}
  .langbtn{border:1px solid var(--line-2);border-radius:10px;padding:15px 30px;min-width:150px;transition:.2s}
  .langbtn:hover{border-color:var(--red);color:var(--red)}
  .langbtn .big{font-size:22px}
  .langbtn .big.ar{font-family:'Amiri',serif}
  .langbtn .sub{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-2);margin-top:5px}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes grow{from{width:0}to{width:44px}}
  #app{animation:appfade .7s ease}
  @keyframes appfade{from{opacity:0}to{opacity:1}}
  .jewelframe{position:absolute;inset:0;pointer-events:none;opacity:0;animation:jffade 1.3s ease 1.8s forwards}
  @keyframes jffade{from{opacity:0}to{opacity:1}}
  .jewelframe .ji{position:absolute;width:26px;height:26px;opacity:.22}
  .jewelframe .ji svg{width:100%;height:100%}

  #app{display:none}
  header{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,#101832,#0B1122);
    backdrop-filter:blur(10px);border-bottom:1px solid rgba(212,175,98,.18)}
  .toptabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;padding:0 6px;scroll-snap-type:x proximity}
  .toptabs::-webkit-scrollbar{display:none}
  .toptab{flex:0 0 auto;scroll-snap-align:center;padding:12px 20px;font-size:15px;font-weight:500;color:var(--ink-2);
    position:relative;white-space:nowrap;transition:.18s;background:transparent}
  .toptab.on{color:var(--ink);font-weight:700}
  .toptab.on:after{content:"";position:absolute;left:20px;right:20px;bottom:0;height:2.5px;background:var(--red);border-radius:2px}
  .toptab:active{transform:scale(.96)}
  .hwrap{max-width:1180px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:12px}
  .wordmark{font-family:'Fraunces',serif;font-size:27px;font-weight:600;letter-spacing:.01em}
  .wordmark .dot{color:#D8C9A6}
  body[dir=rtl] .wordmark{font-family:'Amiri',serif;font-size:23px}
  .rate{margin-inline-start:auto;font-size:11px;color:var(--ink-2);border:1px solid var(--line-2);border-radius:10px;padding:5px 11px;white-space:nowrap}
  .rate b{color:var(--ink)}
  .langtog{border:1px solid var(--line-2);border-radius:10px;padding:6px 12px;font-size:12px;transition:.2s;flex-shrink:0}
  .langtog:hover{border-color:var(--red);color:var(--red)}
  .tryon-btn{display:flex;align-items:center;gap:5px;border:1px solid var(--red);color:var(--red);
    background:var(--red-soft);border-radius:10px;padding:6px 11px;font-size:12px;font-weight:600;
    transition:.2s;flex-shrink:0;white-space:nowrap}
  .tryon-btn:hover{background:var(--red);color:#fff}
  .sell-btn{display:flex;align-items:center;gap:4px;background:var(--red);color:#0E1424;border:none;
    border-radius:10px;padding:7px 14px;font-size:12px;font-weight:700;transition:.2s;flex-shrink:0;white-space:nowrap;
    box-shadow:0 2px 12px rgba(0,0,0,.35)}
  .sell-btn:hover{filter:brightness(1.08)}
  /* try-on modal */
  #tryov{position:fixed;inset:0;z-index:70;background:rgba(27,26,24,.5);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;padding:22px}
  #trycard{background:var(--card);border-radius:18px;max-width:400px;width:100%;padding:28px 24px;text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.28);animation:rise .3s ease}
  #trycard .tryicon{font-size:44px;margin-bottom:6px}
  #trycard h3{font-size:21px;font-weight:700;margin-bottom:8px}
  #trycard p{font-size:14px;color:var(--ink-2);line-height:1.6;margin-bottom:16px}
  .trydrop{border:2px dashed var(--line-2);border-radius:14px;padding:26px 16px;color:#A8A29A;font-size:13px;
    background:var(--paper-2);margin-bottom:14px}
  .trydrop .tdi{font-size:30px;margin-bottom:6px}
  .tryfavh{font-size:12px;color:var(--ink-2);letter-spacing:.06em;text-align:start;margin:4px 0 10px;font-weight:600}
  #tryfavrow{display:flex;gap:10px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px}
  .tryfav{flex-shrink:0;width:88px;cursor:pointer;text-align:center}
  .tryfav img{width:88px;height:88px;object-fit:cover;border-radius:12px;border:1px solid var(--line-2)}
  .tryfav:hover img{border-color:var(--red)}
  .tryfav .tfp{font-size:11px;font-weight:700;color:var(--red);margin-top:4px}
  .tryfavempty{font-size:12.5px;color:#A8A29A;text-align:center;padding:10px 0 6px}
  .trysoon{display:inline-block;background:var(--red-soft);color:var(--red);font-weight:700;font-size:11px;
    letter-spacing:.08em;text-transform:uppercase;border-radius:999px;padding:5px 14px;margin-bottom:14px}
  #trycard .tryclose{border:1px solid var(--line-2);border-radius:10px;padding:11px 0;width:100%;font-weight:600;transition:.2s}
  #trycard .tryclose:hover{border-color:var(--red);color:var(--red)}
  /* Find the same modal */
  #fsov{position:fixed;inset:0;z-index:72;background:rgba(27,26,24,.5);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;padding:22px}
  #fscard{position:relative;background:var(--card);border-radius:18px;max-width:420px;width:100%;padding:26px 22px;
    text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.28);animation:rise .3s ease;max-height:90vh;overflow-y:auto}
  .fsx{position:absolute;top:12px;inset-inline-end:12px;width:32px;height:32px;border-radius:50%;
    border:1px solid var(--line-2);font-size:14px;color:var(--ink-2)}
  .fsic{font-size:42px;margin-bottom:6px}
  #fscard h3{font-size:20px;font-weight:700;margin-bottom:8px}
  #fscard p{font-size:13.5px;color:var(--ink-2);line-height:1.6;margin-bottom:16px}
  .fsdrop{width:100%;border:2px dashed var(--line-2);border-radius:14px;padding:24px 16px;color:#A8A29A;
    font-size:13px;background:var(--paper-2);margin-bottom:14px;transition:.2s}
  .fsdrop:hover{border-color:var(--red);color:var(--red)}
  .fsdrop .tdi{font-size:28px;margin-bottom:6px}
  .fsreshead{font-size:12px;color:var(--ink-2);letter-spacing:.08em;text-transform:uppercase;
    text-align:start;margin-bottom:10px}
  .fsres{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:12px;
    padding:11px 13px;margin-bottom:9px;text-align:start;transition:.18s;cursor:pointer;background:var(--card)}
  .fsres:hover{border-color:var(--red)}
  .fsres .fsav{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--red),var(--red-dk));
    color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0}
  .fsres .fsinfo{flex:1;min-width:0}
  .fsres .fsn{font-weight:600;font-size:14px;display:flex;align-items:center;gap:6px}
  .fsres .fsn .v{color:var(--red);font-size:11px;font-weight:500}
  .fsres .fsm{font-size:11.5px;color:var(--ink-2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fsres .fsmatch{font-size:12px;font-weight:700;color:#1E9E5A;flex-shrink:0}

  .wrap{max-width:1180px;margin:0 auto;padding:0 18px}

  .searchrow{margin-top:16px;position:relative}
  #searchbox{width:100%;background:var(--card);border:1px solid var(--line-2);border-radius:999px;
    padding:14px 20px 14px 46px;color:var(--ink);font-size:15px;font-family:inherit}
  body[dir=rtl] #searchbox{padding:14px 46px 14px 20px}
  #searchbox:focus{outline:none;border-color:var(--red)}
  .searchicon{position:absolute;inset-inline-start:17px;top:0;bottom:0;display:flex;align-items:center;
    font-size:18px;pointer-events:none;z-index:2}
  .searchicon.hide{display:none}
  /* flipping placeholder overlay */
  .searchghost{position:absolute;inset-inline-start:46px;top:0;bottom:0;display:flex;align-items:center;gap:5px;
    pointer-events:none;color:var(--ink);font-size:15px;overflow:hidden}
  .searchghost.hide{display:none}
  .sgstatic{flex-shrink:0;font-weight:600}
  .sgflipwrap{position:relative;height:20px;overflow:hidden;display:inline-block}
  .sgword{display:block;height:20px;line-height:20px;color:#9C948A;font-weight:400;white-space:nowrap;
    animation:flipword .5s ease}
  @keyframes flipword{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  body[dir=rtl] .searchghost{inset-inline-start:auto;inset-inline-end:46px}

  .rail{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:14px 0 6px}
  @media(min-width:720px){.rail{grid-template-columns:repeat(6,1fr)}}
  .cattile{position:relative;background:var(--card);border:1px solid var(--line-2);border-radius:9px;overflow:hidden;
    transition:.18s;cursor:pointer;aspect-ratio:1/0.8;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:4px;padding:8px 6px;
    box-shadow:0 6px 18px rgba(27,26,24,.13)}
  .cattile .cicon{width:42px;height:42px;line-height:1;filter:drop-shadow(0 3px 4px rgba(0,0,0,.16));transition:.2s}
  .cattile .cicon svg{width:100%;height:100%;display:block}
  .cattile:hover .cicon{transform:translateY(-2px) scale(1.06)}
  .cattile .clab{color:var(--ink);font-family:'Inter',sans-serif;font-weight:600;font-size:13px;
    line-height:1.1;text-align:center}
  body[dir=rtl] .cattile .clab{font-family:'Tajawal',sans-serif;font-weight:700}
  .cattile.on{border-color:var(--red);box-shadow:0 0 0 1.5px var(--red),0 4px 12px rgba(200,16,46,.14)}
  .cattile.on .clab{color:var(--red)}
  .cattile:not(.on):hover{border-color:var(--red);box-shadow:0 10px 24px rgba(27,26,24,.18)}

  /* Pieces of the day — swipeable carousel (Dubizzle "What's new" style) */
  /* Top models — Chrono24 style floating cutouts */
  #modelswrap{margin-top:26px}
  .modelrow{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;margin:0 -18px;padding:2px 18px 6px}
  .modelrow::-webkit-scrollbar{display:none}
  .modelcard{flex:0 0 auto;width:170px;cursor:pointer;transition:.18s}
  .modelcard:active{transform:scale(.97)}
  .modelcard .mimg{width:100%;height:190px;border-radius:16px;background:var(--card);
    border:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;padding:18px;
    box-shadow:0 4px 16px rgba(0,0,0,.32);transition:.18s}
  .modelcard:hover .mimg{transform:translateY(-3px);box-shadow:0 12px 28px rgba(0,0,0,.5)}
  .modelcard .mimg img{max-width:100%;max-height:100%;object-fit:contain;
    filter:drop-shadow(0 8px 14px rgba(0,0,0,.45))}
  .modelcard .mbrand{font-size:13px;color:var(--ink-2);margin-top:11px;font-weight:500}
  .modelcard .mname{font-size:15px;font-weight:700;color:var(--ink);margin-top:2px;line-height:1.25}
  /* Top brands section */
  #brandswrap{margin-top:24px}
  .sect-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .sect-h{font-size:22px;font-weight:700;font-family:'Fraunces',serif;letter-spacing:.01em}
  body[dir=rtl] .sect-h{font-family:'Tajawal',sans-serif}
  .sect-arrow{width:34px;height:34px;border-radius:50%;border:1px solid var(--line-2);color:var(--gold);font-size:16px;transition:.15s}
  .sect-arrow:hover{border-color:var(--gold);background:var(--red-soft)}
  .brandrow{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;margin:0 -18px;padding:2px 18px 6px}
  .brandrow::-webkit-scrollbar{display:none}
  .brandcard{flex:0 0 auto;min-width:150px;height:96px;border:1px solid var(--line-2);border-radius:14px;
    background:var(--card);display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:6px;cursor:pointer;transition:.18s;box-shadow:0 4px 14px rgba(0,0,0,.4);
    position:relative;overflow:hidden}
  .brandcard:before{content:"";position:absolute;inset:0;border-radius:14px;padding:1.4px;
    background:linear-gradient(160deg,var(--bgold,var(--gold)),transparent 60%);
    -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;opacity:.55}
  .brandcard:hover{transform:translateY(-3px);box-shadow:0 12px 26px rgba(0,0,0,.55)}
  .brandcard .bname{font-family:'Fraunces',serif;font-size:19px;font-weight:600;color:var(--ink);letter-spacing:.02em;text-align:center;padding:0 10px;line-height:1.1}
  .brandcard .bsub{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-2);opacity:.8}
  .potd-h{font-size:22px;font-weight:600;margin:22px 0 12px;font-family:'Inter',sans-serif;
    display:flex;align-items:center;gap:10px}
  .potd-h .featbadge{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    background:linear-gradient(120deg,#E6DBBF,#C9B896);color:#1C2438;border-radius:999px;padding:4px 11px}
  body[dir=rtl] .potd-h{font-family:'Tajawal',sans-serif;font-weight:700}
  /* Try on / Find the same tools row */
  #toolswrap{margin-top:26px}
  .tools-h{font-size:20px;font-weight:700;margin-bottom:12px}
  .toolsrow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .toolcard{display:flex;align-items:center;gap:11px;text-align:start;border:1px solid var(--line-2);
    border-radius:14px;padding:14px 13px;background:var(--card);transition:.18s;box-shadow:0 4px 12px rgba(0,0,0,.4)}
  .toolcard:hover{border-color:var(--red);box-shadow:0 8px 20px rgba(27,26,24,.13);transform:translateY(-2px)}
  .toolic{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;
    font-size:22px;flex-shrink:0}
  .toolname{font-size:14.5px;font-weight:700;line-height:1.2}
  .toolsub{font-size:11.5px;color:var(--ink-2);margin-top:3px;line-height:1.25}
  .potd{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;
    padding-bottom:6px;margin:0 -18px;padding-inline:18px;scrollbar-width:none}
  .potd::-webkit-scrollbar{display:none}
  .potdcard{flex:0 0 46%;max-width:210px;scroll-snap-align:start;border:1px solid var(--line);
    border-radius:14px;overflow:hidden;cursor:pointer;background:var(--card);
    box-shadow:0 4px 14px rgba(0,0,0,.4);transition:.2s}
  @media(min-width:640px){.potdcard{flex-basis:31%}}
  .potdcard:hover{box-shadow:0 10px 24px rgba(0,0,0,.55);transform:translateY(-2px)}
  .potdcard .pimg{position:relative;height:150px;background:#141C33;overflow:hidden}
  .potdcard .pimg img{width:100%;height:100%;object-fit:cover}
  .potdcard .ptag{position:absolute;top:9px;inset-inline-start:9px;background:var(--red);color:#fff;
    font-size:9.5px;font-weight:700;border-radius:7px;padding:3px 8px;letter-spacing:.03em}
  .potdcard .pbody{padding:10px 12px 12px}
  .potdcard .ptitle{font-size:13.5px;font-weight:600;line-height:1.3}
  .potdcard .pprice{font-family:'Inter',sans-serif;font-size:16px;font-weight:700;color:var(--red);margin-top:4px}
  body[dir=rtl] .potdcard .pprice{font-family:'Tajawal',sans-serif}
  .potdcard .pstore{font-size:11px;color:var(--ink-2);margin-top:5px}

  .sectrow{display:flex;align-items:baseline;justify-content:space-between;margin:30px 0 4px}
  .secttl{font-size:24px;font-weight:500}
  .sectcount{font-size:12px;color:var(--ink-2)}
  .sectbar{width:34px;height:2px;background:var(--red);margin:8px 0 16px}
  .subbar{display:flex;gap:8px;overflow-x:auto;padding:10px 0 4px;margin:0 -18px;padding-inline:18px;scrollbar-width:none}
  .subbar::-webkit-scrollbar{display:none}
  .subchip{flex-shrink:0;border:1px solid var(--line-2);background:var(--card);border-radius:999px;
    padding:8px 15px;font-size:13px;font-weight:500;color:var(--ink);transition:.15s;white-space:nowrap;
    box-shadow:0 2px 6px rgba(42,33,26,.05)}
  .subchip:hover{border-color:var(--red)}
  .subchip.on{background:var(--red);color:#fff;border-color:var(--red)}

  #grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding-bottom:20px}
  @media(min-width:720px){#grid{grid-template-columns:repeat(4,1fr);gap:14px}}
  .card{border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;background:var(--paper);

<script>
let lang="en", curCat=null, curSub=null, currentStoreId=null, FAVS=new Set();
const $=id=>document.getElementById(id);

function setNav(el){
  document.querySelectorAll("#nav .navb").forEach(b=>b.classList.remove("on"));

}

let curTab="discover";
function renderTopTabs(){
  const tabs=t().toptabs; const wrap=$("toptabs"); if(!wrap)return;
  wrap.innerHTML="";
  tabs.forEach(([id,label])=>{
    const b=document.createElement("button");
    b.className="toptab"+(curTab===id?" on":"");
    b.textContent=label;
    b.onclick=()=>{curTab=id;renderTopTabs();b.scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});onTabChange(id);};
    wrap.appendChild(b);
  });
  // center the active tab
  const active=wrap.querySelector(".toptab.on");
  if(active)active.scrollIntoView({behavior:"auto",inline:"center",block:"nearest"});
}
function onTabChange(id){
  // hook for later: filter home content per tab. For now just resets to home view.
  curCat=null;curSub=null;$("searchbox").value="";renderHero();renderGrid();renderRail();window.scrollTo({top:0,behavior:"smooth"});
}

/* subtle haptic tap on interactive elements (supported phones) */
document.addEventListener("pointerdown",e=>{

/* --- build a moderate outline-jewelry frame around the splash --- */
(function buildJewelFrame(){
  const frame=document.getElementById("jewelframe");if(!frame)return;
  const OUT={
    diamond:'<svg viewBox="0 0 32 32" fill="none" stroke="#8C6A2B" stroke-width="1.6" stroke-linejoin="round"><path d="M9 6h14l6 7-13 15L3 13z"/><path d="M9 6l3 7h8l3-7M3 13h26M12 13l4 15M20 13l-4 15"/></svg>',
    ring:'<svg viewBox="0 0 32 32" fill="none" stroke="#8C6A2B" stroke-width="1.6" stroke-linejoin="round"><circle cx="16" cy="20" r="9"/><path d="M11 10l5-6 5 6-5 4z"/></svg>',
    gem:'<svg viewBox="0 0 32 32" fill="none" stroke="#8C6A2B" stroke-width="1.6" stroke-linejoin="round"><path d="M6 12h20l-10 14z"/><path d="M6 12l10 6 10-6M11 12l5 14M21 12l-5 14"/></svg>',
    watch:'<svg viewBox="0 0 32 32" fill="none" stroke="#8C6A2B" stroke-width="1.6" stroke-linejoin="round"><circle cx="16" cy="16" r="8"/><path d="M13 8V4h6v4M13 24v4h6v-4M16 16V11M16 16l4 2"/></svg>',
    earring:'<svg viewBox="0 0 32 32" fill="none" stroke="#8C6A2B" stroke-width="1.6" stroke-linejoin="round"><path d="M11 8a5 5 0 0 1 10 0"/><circle cx="16" cy="15" r="4"/><path d="M16 19l-3 9h6z"/></svg>',
    bar:'<svg viewBox="0 0 32 32" fill="none" stroke="#8C6A2B" stroke-width="1.6" stroke-linejoin="round"><path d="M8 16h16l3 9H5z"/><path d="M11 9h10l3 7H8z"/></svg>'
  };
  const keys=Object.keys(OUT);
  // positions around the border (percent x,y)
  const pts=[
    [8,10],[26,6],[50,8],[74,6],[92,10],
    [6,30],[94,30],
    [7,52],[93,52],
    [6,72],[94,72],
    [10,90],[30,94],[52,92],[74,94],[90,90]
  ];
  pts.forEach((p,i)=>{
    const d=document.createElement("div");d.className="ji";
    d.style.left=p[0]+"%";d.style.top=p[1]+"%";
    d.style.transform="translate(-50%,-50%) rotate("+((i*37)%40-20)+"deg)";
    d.innerHTML=OUT[keys[i%keys.length]];
    frame.appendChild(d);
  });
})();

const t=()=>TXT[lang];
const fmt=n=>"AED "+n.toLocaleString(lang==="ar"?"ar-EG":"en-US");
const purity=k=>k===24?"999":k===22?"916":k===21?"875":"750";

function setImg(el,srcs,i=0){el.src=srcs[i];
  el.onerror=()=>{if(i+1<srcs.length)setImg(el,srcs,i+1);else{el.removeAttribute("src");el.style.background="#EFE9E1";}};}

function start(l){lang=l;$("splash").style.opacity=0;
  setTimeout(()=>{$("splash").style.display="none";$("app").style.display="block";$("nav").style.display="flex";},500);
  renderAll();}

function resetAll(){curCat=null;curSub=null;$("searchbox").value="";renderAll();window.scrollTo(0,0);}
function openFavs(){
  closeStore();closeSheet();
  curCat=null;curSub=null;$("searchbox").value="";
  $("subbar").style.display="none";
  $("potdwrap").style.display="none";$("toolswrap").style.display="none";

  document.body.dir=t().dir;

  renderBrands();

  updateGhost();
  restartFlip();
  $("lb-home").textContent=t().home;$("lb-fav").textContent=t().fav;

let flipTimer=null, flipIdx=0;
function updateGhost(){
  const box=$("searchbox"), ghost=$("searchghost"), icon=$("searchicon");
  const active=(document.activeElement===box)||(box.value||"").length>0;
  ghost.classList.toggle("hide",active);
  // when typing, show a plain search icon
  
}
function restartFlip(){
  if(flipTimer)clearInterval(flipTimer);
  const words=t().flips; flipIdx=0;
  const set=()=>{
    const [word,emoji]=words[flipIdx];
    const w=$("sgword");w.textContent=word;
    w.style.animation="none";void w.offsetWidth;w.style.animation="flipword .5s ease";
    
  };
  set();
  flipTimer=setInterval(()=>{flipIdx=(flipIdx+1)%words.length;set();},1500);
}

function renderRail(){
  const r=$("rail");r.innerHTML="";
  CATS.forEach(c=>{
    const b=document.createElement("button");
    const on=(curCat===c.id);
    b.className="cattile"+(on?" on":"");
    b.innerHTML='<div class="cicon">'+ICONS[c.id]+'</div><div class="clab">'+t().cats[c.id]+'</div>';
    b.onclick=()=>{
      if(c.id==="viewall"){curCat=null;curSub=null;$("searchbox").value="";renderAll();window.scrollTo(0,0);return;}
      curCat=(curCat===c.id?null:c.id);curSub=null;$("searchbox").value="";renderAll();window.scrollTo(0,0);
    };
    r.appendChild(b);
  });
}

function renderHero(){
  const wrap=$("potdwrap"), row=$("potd");
  // hide the carousel + tools when filtering or searching
  if(curCat||($("searchbox").value||"").trim()){wrap.style.display="none";$("toolswrap").style.display="none";return;}
  wrap.style.display="block";$("toolswrap").style.display="block";
  $("potdh").innerHTML=t().featured+' <span class="featbadge">'+t().featlabel+'</span>';
  // newest pieces become "pieces of the day"
  const picks=ITEMS.slice().sort((a,b)=>a.days-b.days).slice(0,6);
  row.innerHTML="";
  picks.forEach(it=>{
    const s=STORES[it.s];const isGold=it.cat!=="watches";
    const c=document.createElement("div");c.className="potdcard";
    c.innerHTML='<div class="pimg"><img alt=""><span class="ptag">'+(it.days===0?t().today.toUpperCase():t().cats[it.cat])+'</span></div>'+
      '<div class="pbody"><div class="ptitle">'+it.t[lang]+'</div>'+
      '<div class="pprice">'+fmt(it.p)+'</div>'+
      '<div class="pstore">'+s[lang]+' · 📍 '+s.area[lang]+'</div></div>';
    setImg(c.querySelector("img"),it.img);
    c.onclick=()=>openSheet(it);
    row.appendChild(c);
  });
}

function renderGrid(){
  const q=($("searchbox").value||"").trim().toLowerCase();
  let list=ITEMS.slice();
  const sub=$("subbar");
  if(q){
    $("secttl").textContent="“"+$("searchbox").value+"”";
    list=list.filter(it=>(it.t.en+" "+it.t.ar+" "+t().cats[it.cat]+" "+STORES[it.s].en).toLowerCase().includes(q));
    sub.style.display="none";
  }else if(curCat){
    $("secttl").textContent=t().cats[curCat];
    if(curCat==="diamondsgold"){
      list=list.filter(it=>it.cat==="diamonds"||it.cat==="bars");
    }else{
      list=list.filter(it=>it.cat===curCat);
    }
    renderSubBar(curCat);
    // filter by chosen sub-type
    if(curSub){
      const key=curSub.toLowerCase();
      // gold-weight chips only match gold bars; others match text
      if(curCat==="diamondsgold" && /gold|ذهب|oz|أونصة/.test(key)){
        const wt=key.replace(/[^0-9]/g,"");
        list=list.filter(it=>it.cat==="bars" && (wt?((it.t.en+it.t.ar).includes(wt)):true));
      }else{
        list=list.filter(it=>((it.t.en+" "+it.t.ar+" "+(it.d?it.d.en+" "+it.d.ar:"")).toLowerCase()).includes(key));
      }
    }
  }else{
    $("secttl").textContent=t().browse;
    sub.style.display="none";
  }
  $("sectcount").textContent=list.length+" "+t().listings;
  if(!list.length){$("grid").innerHTML='<div id="empty"><div class="es">◇</div>'+t().empty+'</div>';return;}
  drawGridItems(list);
}

function renderSubBar(cat){
  const bar=$("subbar");const subs=(t().subs&&t().subs[cat])||[];
  bar.innerHTML="";bar.style.display="flex";
  // View all chip
  const all=document.createElement("button");
  all.className="subchip"+(curSub===null?" on":"");
  all.textContent=t().viewall+" "+t().cats[cat].toLowerCase();
  all.onclick=()=>{curSub=null;renderGrid();window.scrollTo(0,0);};
  bar.appendChild(all);
  subs.forEach(s=>{
    const b=document.createElement("button");
    b.className="subchip"+(curSub===s?" on":"");
    b.textContent=s;
    b.onclick=()=>{curSub=(curSub===s?null:s);renderGrid();window.scrollTo(0,0);};
    bar.appendChild(b);
  });
}

function drawGridItems(list){
  const g=$("grid");g.innerHTML="";
  list.forEach((it,i)=>{
    const s=STORES[it.s];const isGold=it.cat!=="watches";
    const c=document.createElement("div");c.className="card";c.style.animationDelay=Math.min(i*35,350)+"ms";
    c.innerHTML='<div class="ph"><img alt="">'+
        '<span class="tagchip">'+(isGold?it.k+"K":t().cats.watches)+'</span>'+
        (s.v?'<span class="vchip">✓ '+t().verified+'</span>':'')+
        '<button class="heart" onclick="event.stopPropagation();toggleFav('+it.id+',this)">'+heartIcon(it.id)+'</button></div>'+
      '<div class="body"><div class="cttl">'+it.t[lang]+'</div>'+
        '<div class="cprice">'+fmt(it.p)+'</div>'+
        '<div class="cstore"><span>'+s[lang]+'</span><span>'+(isGold?it.w+"g":"")+'</span></div></div>';
    setImg(c.querySelector("img"),it.img);
    c.onclick=()=>openSheet(it);
    g.appendChild(c);
  });
}

function renderAll(){renderChrome();renderRail();renderHero();renderGrid();}
function onSearch(){
  updateGhost();renderHero();renderGrid();
}
function scrollToResults(){
  const q=($("searchbox").value||"").trim();
  if(!q)return;
  const a=$("resultsanchor");
  if(a){
    const y=a.getBoundingClientRect().top+window.scrollY-70;
    window.scrollTo({top:y,behavior:"smooth"});
  }
}
document.addEventListener("DOMContentLoaded",()=>{
  const box=$("searchbox");
  box.addEventListener("focus",updateGhost);
  box.addEventListener("blur",updateGhost);
});

function heartIcon(id){return FAVS.has(id)?'♥':'<span class="hoff">♡</span>';}
function toggleFav(id,el){
  if(FAVS.has(id))FAVS.delete(id);else FAVS.add(id);
  if(el)el.innerHTML=heartIcon(id);
  // refresh favorites badge count in nav
  updateFavBadge();
}
function updateFavBadge(){
  const b=$("favcount");if(!b)return;
  if(FAVS.size>0){b.style.display="inline-flex";b.textContent=FAVS.size;}else{b.style.display="none";}
}

function openSheet(it){
  const s=STORES[it.s];const isGold=it.cat!=="watches";
  setImg($("dimg"),it.img);
  $("dtags").innerHTML=(isGold
      ?'<span class="tag karat">'+it.k+'K · '+purity(it.k)+'</span><span class="tag">'+t().weight+': '+it.w+'g</span>'
      :'<span class="tag red">'+t().cats.watches+'</span>')
    +'<span class="tag">'+t().cats[it.cat]+'</span>';
  $("dttl").textContent=it.t[lang];
  $("dheart").innerHTML=heartIcon(it.id);
  $("dheart").onclick=()=>{toggleFav(it.id);$("dheart").innerHTML=heartIcon(it.id);};
  $("dprice").textContent=fmt(it.p);
  $("dmeta").textContent=(isGold?t().making+" · ":"")+t().posted+" "+(it.days===0?t().today:it.days+" "+t().days);
  $("ddesc").textContent=it.d[lang];
  $("savatar").textContent=s[lang].charAt(0);
  $("sname").innerHTML=s[lang]+(s.v?' <span class="v">✓ '+t().verified+'</span>':'');
  $("sarea").textContent="📍 "+s.area[lang];
  $("callbtn").textContent="📞 "+t().call+" · "+s.phone;
  $("callbtn").href="tel:"+s.phone.replace(/\s/g,"");
  $("wabtn").textContent=t().wa;$("wabtn").href="https://wa.me/"+s.wa;
  currentStoreId=it.s;
  $("viewstorebtn").textContent=t().viewstore+" ›";
  $("srow").onclick=()=>openStore(it.s);
  $("morettl").textContent=t().more;
  const m=$("more");m.innerHTML="";
  ITEMS.filter(x=>x.s===it.s&&x.id!==it.id).slice(0,3).forEach(x=>{
    const d=document.createElement("div");d.className="mini";
    d.innerHTML='<img alt=""><div class="mb"><div class="mt">'+x.t[lang]+'</div><div class="mp">'+fmt(x.p)+'</div></div>';
    setImg(d.querySelector("img"),x.img);d.onclick=()=>openSheet(x);m.appendChild(d);
  });
  $("overlay").style.display="flex";document.body.style.overflow="hidden";
}
function closeSheet(){$("overlay").style.display="none";document.body.style.overflow="";}

function openStore(sid){
  const s=STORES[sid];const items=ITEMS.filter(x=>x.s===sid);
  $("overlay").style.display="none";
  $("storehtitle").textContent=s[lang];
  $("storeav").textContent=s[lang].charAt(0);
  $("storename").innerHTML=s[lang]+(s.v?' <span class="v">✓ '+t().verified+'</span>':'');
  $("storemeta").textContent="📍 "+s.area[lang];
  $("storecount").textContent=items.length+" "+t().storecount;
  $("storecall").textContent="📞 "+t().call+" · "+s.phone;
  $("storecall").href="tel:"+s.phone.replace(/\s/g,"");
  $("storewa").textContent=t().wa;$("storewa").href="https://wa.me/"+s.wa;
  $("storesecth").textContent=t().storeitems;
  const g=$("storegrid");g.innerHTML="";
  items.forEach((it,i)=>{
    const isGold=it.cat!=="watches";
    const c=document.createElement("div");c.className="card";c.style.animationDelay=Math.min(i*35,350)+"ms";
    c.innerHTML='<div class="ph"><img alt="">'+
        '<span class="tagchip">'+(isGold?it.k+"K":t().cats.watches)+'</span></div>'+
      '<div class="body"><div class="cttl">'+it.t[lang]+'</div>'+
        '<div class="cprice">'+fmt(it.p)+'</div>'+
        '<div class="cstore"><span>'+t().cats[it.cat]+'</span><span>'+(isGold?it.w+"g":"")+'</span></div></div>';
    setImg(c.querySelector("img"),it.img);
    c.onclick=()=>{closeStore();openSheet(it);};
    g.appendChild(c);
  });
  $("storeov").style.display="block";document.body.style.overflow="hidden";window.scrollTo(0,0);
  $("storeov").scrollTop=0;
}
function closeStore(){$("storeov").style.display="none";document.body.style.overflow="";}

function openProfile(){
  $("profhtitle").textContent=t().profh;
  $("profname").textContent=t().profname;
  $("profverified").innerHTML="✓ "+t().profverified;
  $("profjoined").textContent=t().profjoined;
  $("pt-fav").textContent=t().ptfav;
  $("pt-sell").textContent=t().ptsell;
  const m=$("profmenu");m.innerHTML="";
  t().mrows.forEach((row,i)=>{
    const b=document.createElement("button");b.className="profrow";
    b.innerHTML='<span class="pri">'+row[0]+'</span><span class="prl">'+row[1]+'</span><span class="prc">›</span>';
    b.onclick=()=>{
      if(i===6){toggleLang();openProfile();}          // Language row
      else if(i===0){closeProfile();}                  // My profile (already here)
      else if(i===8){closeProfile();alert(row[1]);}    // Sign out
      else alert(row[1]+" — coming soon");
    };
    m.appendChild(b);
  });
  $("profileov").style.display="block";document.body.style.overflow="hidden";
  $("profileov").scrollTop=0;
}
function closeProfile(){$("profileov").style.display="none";document.body.style.overflow="";}
function openTryOn(){
  document.querySelector("#trycard .tryicon").textContent="📸✨";
  $("trysoon").textContent=t().trysoon;
  $("tryh").textContent=t().tryh;
  $("tryp").textContent=t().tryp;
  $("trydroptxt").textContent=t().trydrop;
  $("tryclose").textContent=t().tryclose;
  $("tryfavh").textContent=t().tryfavh;
  const favItems=ITEMS.filter(x=>FAVS.has(x.id));
  const row=$("tryfavrow");row.innerHTML="";
  if(!favItems.length){
    row.innerHTML='<div class="tryfavempty">'+t().tryfavempty+'</div>';
  }else{
    favItems.forEach(it=>{
      const d=document.createElement("div");d.className="tryfav";
      d.innerHTML='<img alt=""><div class="tfp">'+fmt(it.p).replace("AED ","")+'</div>';
      setImg(d.querySelector("img"),it.img);
      d.onclick=()=>{closeTryOn();openSheet(it);};
      row.appendChild(d);
    });

function closeTryOn(){$("tryov").style.display="none";document.body.style.overflow="";}

function openFindSame(){
  $("fssoon").textContent=t().trysoon;
  $("fsh").textContent=t().fsh;
  $("fsp").textContent=t().fsp;
  $("fsdroptxt").textContent=t().fsdrop;
  $("fsclose").textContent=t().fsclose;
  $("fsresults").style.display="none";
  $("fsov").style.display="flex";document.body.style.overflow="hidden";
}
function fsShowResults(){
  // Demo: show stores that can "replicate" with a match score
  $("fsreshead").textContent=t().fsreshead;
  const order=["lulwa","alnoor","bait","sikka"];
  const matches=[94,88,81,76];
  const list=$("fsreslist");list.innerHTML="";
  order.forEach((sid,i)=>{
    const s=STORES[sid];
    const d=document.createElement("div");d.className="fsres";

function closeFindSame(){$("fsov").style.display="none";document.body.style.overflow="";}
let sellCity=null, sellCat=null;
function openSell(){ openSellCity(); }

function openSellCity(){
  const T=t();
  $("sc-title").textContent=T.scTitle;
  $("sc-h").textContent=T.scH;$("sc-sub").textContent=T.scSub;
  const list=$("sc-list");list.innerHTML="";
  T.sflocs.forEach(city=>{
    const b=document.createElement("button");b.className="cityrow"+(sellCity===city?" on":"");
    b.innerHTML='<span>'+city+'</span><span class="ck">✓</span>';
    b.onclick=()=>{sellCity=city;openSellCat();};
    list.appendChild(b);
  });
  hideSellScreens();
  $("sellcity").style.display="block";document.body.style.overflow="hidden";$("sellcity").scrollTop=0;
}

function openSellCat(){
  const T=t();
  $("scat-title").textContent=T.scTitle;
  $("scat-h").textContent=T.scatH;$("scat-sub").textContent=T.scatSub;
  const grid=$("scat-grid");grid.innerHTML="";
  const cats=[["diamondsgold",T.cats.diamondsgold],["rings",T.cats.rings],["necklaces",T.cats.necklaces],["bracelets",T.cats.bracelets],["bangles",T.cats.bangles],["earrings",T.cats.earrings],["sets",T.cats.sets],["watches",T.cats.watches]];
  cats.forEach(([id,label])=>{
    const b=document.createElement("button");b.className="catpick";
    b.innerHTML='<div class="cpi">'+(ICONS[id]||ICONS.diamondsgold)+'</div><div class="cpl">'+label+'</div>';
    b.onclick=()=>{sellCat=id;openSellForm();};
    grid.appendChild(b);
  });
  hideSellScreens();
  $("sellcat").style.display="block";document.body.style.overflow="hidden";$("sellcat").scrollTop=0;
}
function backToCity(){openSellCity();}
function hideSellScreens(){$("sellcity").style.display="none";$("sellcat").style.display="none";$("sellform").style.display="none";$("sellpkg").style.display="none";}
function closeSellFlow(){hideSellScreens();document.body.style.overflow="";}

function openSellForm(){
  const T=t();
  $("sf-title").textContent=T.sellh;
  $("sf-intro").textContent=T.sfintro;
  const rq=' <span class="req">＊</span>';
  $("sf-l-photos").innerHTML=T.sflphotos+rq;$("sf-addphoto").textContent=T.sfaddphoto;$("sf-h-photos").textContent=T.sfhphotos;
  $("sf-l-title").innerHTML=T.sfltitle+rq;$("sf-l-cat").innerHTML=T.sflcat+rq;
  $("sf-l-karat").innerHTML=T.sflkarat+rq;$("sf-l-weight").innerHTML=T.sflweight+rq;$("sf-l-making").textContent=T.sflmaking;
  $("sf-mk-1").textContent=T.sfmk1;$("sf-mk-2").textContent=T.sfmk2;
  $("sf-l-shape").innerHTML=T.sflshape+rq;$("sf-l-carat").innerHTML=T.sflcarat+rq;$("sf-l-clarity").textContent=T.sflclarity;
  $("sf-l-color").textContent=T.sflcolor;$("sf-l-cert").textContent=T.sflcert;
  $("sf-l-brand").innerHTML=T.sflbrand+rq;$("sf-l-ref").textContent=T.sflref;$("sf-l-year").innerHTML=T.sflyear+rq;
  $("sf-l-set").textContent=T.sflset;$("sf-set-1").textContent=T.sfset1;$("sf-set-2").textContent=T.sfset2;
  $("sf-l-price").innerHTML=T.sflprice+rq;$("sf-l-neg").textContent=T.sflneg;
  $("sf-l-cond").textContent=T.sflcond;$("sf-l-loc").innerHTML=T.sflloc+rq;
  $("sf-l-contact").innerHTML=T.sflcontact+rq;$("sf-l-desc").textContent=T.sfldesc;
  $("sf-submit").textContent=T.sfsubmit;$("sf-note").textContent=T.sfnote;
  // category dropdown
  const cat=$("sf-in-cat");cat.innerHTML="";
  [["diamondsgold",T.cats.diamondsgold],["rings",T.cats.rings],["necklaces",T.cats.necklaces],["bracelets",T.cats.bracelets],["bangles",T.cats.bangles],["earrings",T.cats.earrings],["sets",T.cats.sets],["watches",T.cats.watches]].forEach(([v,l])=>{
    const o=document.createElement("option");o.value=v;o.textContent=l;cat.appendChild(o);
  });
  // condition chips
  const cc=$("sf-cond");cc.innerHTML="";
  T.sfconds.forEach((c,i)=>{
    const b=document.createElement("button");b.className="sfcond"+(i===0?" on":"");b.textContent=c;
    b.onclick=()=>{[...cc.children].forEach(x=>x.classList.remove("on"));b.classList.add("on");};
    cc.appendChild(b);
  });
  // locations
  const loc=$("sf-in-loc");loc.innerHTML="";
  T.sflocs.forEach(l=>{const o=document.createElement("option");o.textContent=l;loc.appendChild(o);});
  sfCatChange();
  // preselect from the step screens
  if(sellCat){$("sf-in-cat").value=sellCat;sfCatChange();}
  if(sellCity){const loc=$("sf-in-loc");[...loc.options].forEach(o=>{if(o.textContent===sellCity)loc.value=o.value;});}
  hideSellScreens();
  $("sellform").style.display="block";document.body.style.overflow="hidden";
  $("sellform").scrollTop=0;
}
function sfCatChange(){
  const v=$("sf-in-cat").value;
  const isWatch=v==="watches";
  const isDiamondGold=v==="diamondsgold";
  const isGoldJewelry=["rings","necklaces","bracelets","bangles","earrings","sets"].includes(v);
  $("sf-gold").style.display=(isGoldJewelry||isDiamondGold)?"block":"none";
  $("sf-diamond").style.display=isDiamondGold?"block":"none";
  $("sf-watch").style.display=isWatch?"block":"none";
}
let selectedPkg="premium";
function submitListing(){
  const T=t();
  const title=$("sf-in-title").value.trim();
  const price=parseFloat($("sf-in-price").value)||0;
  if(!title||!price){alert(T.sfvalidate);return;}
  openPackages();
}
function openPackages(){
  const T=t();
  $("pkg-title").textContent=T.pkgTitle;
  $("pkg-h").textContent=T.pkgH;$("pkg-sub").textContent=T.pkgSub;
  $("pkg-submit").textContent=T.pkgSubmit;$("pkg-note").textContent=T.pkgNote;
  const list=$("pkg-list");list.innerHTML="";
  T.packages.forEach(p=>{
    const c=document.createElement("div");c.className="pkgcard"+(selectedPkg===p.id?" on":"");
    c.innerHTML=(p.popular?'<div class="pkgbadge">'+T.pkgPopular+'</div>':'')+
      '<div class="pkgtop"><div class="pkgname">'+p.name+'</div>'+
      '<div style="display:flex;align-items:center;gap:12px"><div class="pkgprice">'+p.price+(p.per?' <small>'+p.per+'</small>':'')+'</div><div class="pkgradio"></div></div></div>'+
      '<ul class="pkgfeat">'+p.feats.map(f=>'<li>'+f+'</li>').join('')+'</ul>';
    c.onclick=()=>{selectedPkg=p.id;openPackages();};
    list.appendChild(c);
  });
  hideSellScreens();
  $("sellpkg").style.display="block";document.body.style.overflow="hidden";$("sellpkg").scrollTop=0;
}
function backToForm(){hideSellScreens();$("sellform").style.display="block";document.body.style.overflow="hidden";}
function publishWithPackage(){
  const T=t();
  const title=$("sf-in-title").value.trim();
  const price=parseFloat($("sf-in-price").value)||0;
  const cat=$("sf-in-cat").value;
  const isGold=cat!=="watches";
  const karat=parseInt($("sf-in-karat").value)||21;
  const weight=parseFloat($("sf-in-weight").value)||0;
  const desc=$("sf-in-desc").value.trim();
  const newId=1000+ITEMS.length;
  ITEMS.unshift({
    id:newId, cat:(cat==="diamondsgold"?"diamonds":cat), k:isGold?karat:0, w:isGold?weight:0,
    p:price, s:"abadi", days:0, img:IMG.necklace, feat:(selectedPkg!=="basic"),
    t:{en:title,ar:title}, d:{en:desc||title,ar:desc||title}
  });
  ["sf-in-title","sf-in-price","sf-in-weight","sf-in-carat","sf-in-desc","sf-in-brand","sf-in-ref","sf-in-year","sf-in-phone"].forEach(id=>{if($(id))$(id).value="";});
  sellCity=null;sellCat=null;selectedPkg="premium";
  closeSellFlow();
  alert(T.sfsuccess);
  openStore("abadi");
}
function closeSellForm(){closeSellFlow();}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeSheet();});
</script>
